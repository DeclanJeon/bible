<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="성경 길찾기: 고민 한 문장을 본문, 맥락, 교차참조로 연결하는 성경 공부 앱">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbfaf7"/>
      <stop offset="100%" stop-color="#f1e7d6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#12100d" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="66" y="56" width="1068" height="518" rx="34" fill="rgba(255,255,255,0.76)" stroke="rgba(181,101,25,0.38)" stroke-width="2" filter="url(#shadow)"/>
  <rect x="96" y="92" width="288" height="446" rx="28" fill="#12100d"/>
  <rect x="134" y="130" width="92" height="92" rx="22" fill="#0b1020" stroke="#fbbf24" stroke-width="3"/>
  <text x="180" y="193" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="700" fill="#fbbf24">B</text>
  <text x="134" y="294" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#fff8ed">Bible Hyperlink</text>
  <text x="134" y="333" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#fff8ed">Companion</text>
  <text x="134" y="366" dominant-baseline="hanging" font-family="system-ui, sans-serif" font-size="21" fill="#d7c4a5">본문 먼저 · 출처 기반</text>
  <text x="134" y="398" dominant-baseline="hanging" font-family="system-ui, sans-serif" font-size="21" fill="#d7c4a5">한국어 성경 공부</text>
  <path d="M165 462H207M245 462H288" stroke="#b76519" stroke-width="4" stroke-linecap="round"/>
  <g font-family="system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle" fill="#fff4da">
    <circle cx="146" cy="462" r="18" fill="#fffaf0" stroke="#b76519" stroke-width="3"/><text x="146" y="509">질문</text>
    <circle cx="226" cy="462" r="18" fill="#fffaf0" stroke="#b76519" stroke-width="3"/><text x="226" y="509">본문</text>
    <circle cx="306" cy="462" r="18" fill="#fffaf0" stroke="#b76519" stroke-width="3"/><text x="306" y="509">맥락</text>
  </g>
  <text x="448" y="180" font-family="system-ui, sans-serif" font-size="70" font-weight="900" fill="#b76519">성경 길찾기</text>
  <text x="448" y="258" font-family="system-ui, sans-serif" font-size="48" font-weight="900" fill="#2d2720">고민 한 문장을</text>
  <text x="448" y="320" font-family="system-ui, sans-serif" font-size="48" font-weight="900" fill="#2d2720">본문 · 맥락 · 교차참조로 연결</text>
  <text x="448" y="389" font-family="system-ui, sans-serif" font-size="28" fill="#5f5142">성구를 끼워 맞추지 않고, 먼저 본문을 읽고</text>
  <text x="448" y="431" font-family="system-ui, sans-serif" font-size="28" fill="#5f5142">시대·장소·저자·연결 본문까지 따라갑니다.</text>
  <g font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#8b5e2d">
    <rect x="448" y="466" width="116" height="50" rx="25" fill="rgba(255,255,255,0.72)" stroke="rgba(181,101,25,0.45)"/><text x="466" y="497">본문 중심</text>
    <rect x="586" y="466" width="116" height="50" rx="25" fill="rgba(255,255,255,0.72)" stroke="rgba(181,101,25,0.45)"/><text x="604" y="497">교차참조</text>
    <rect x="724" y="466" width="116" height="50" rx="25" fill="rgba(255,255,255,0.72)" stroke="rgba(181,101,25,0.45)"/><text x="742" y="497">문맥 라벨</text>
    <rect x="862" y="466" width="116" height="50" rx="25" fill="rgba(255,255,255,0.72)" stroke="rgba(181,101,25,0.45)"/><text x="880" y="497">공부 레인</text>
