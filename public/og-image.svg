  <rect x="100" y="460" width="200" height="48" rx="24" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.4)" stroke-width="1"/>
  <text x="200" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#fbbf24">bible-guide.kr</text>
</svg>
