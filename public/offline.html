<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오프라인 | 성경 하이퍼링크 컴패니언</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #08080d;
      color: #f0ece4;
      font-family: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #0e0e16;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 420px;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; color: #8a8480; line-height: 1.7; margin-bottom: 24px; }
    a {
      display: inline-block;
      background: #d4a853;
      color: #08080d;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📖</div>
    <h1>오프라인 상태입니다</h1>
    <p>인터넷 연결을 확인한 뒤 다시 시도해 주세요. 이전에 방문한 페이지는 캐시에서 일부 표시될 수 있습니다.</p>
    <a href="/ko">다시 시도</a>
  </div>
</body>
</html>
