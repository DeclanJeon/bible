<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="110" y1="40" x2="1510" y2="1160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#11172A"/>
      <stop offset="1" stop-color="#070B14"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect x="40" y="32" width="1520" height="1136" rx="36" stroke="white" stroke-opacity="0.08"/>
  <rect x="66" y="58" width="1468" height="64" rx="22" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
  <text x="104" y="98" fill="white" font-size="22" font-weight="700" font-family="Inter, Pretendard, sans-serif">스터디 데스크</text>
  <text x="274" y="98" fill="#93A0BC" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">침묵 속의 기다림 · 시편 13편</text>

  <rect x="70" y="154" width="220" height="976" rx="28" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
  <text x="98" y="208" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">읽기 순서</text>
  <rect x="98" y="230" width="164" height="48" rx="18" fill="#E7C986" fill-opacity="0.16" stroke="#E7C986" stroke-opacity="0.35"/>
  <text x="124" y="261" fill="white" font-size="18" font-weight="700" font-family="Inter, Pretendard, sans-serif">본문</text>
  <rect x="98" y="292" width="164" height="48" rx="18" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <text x="124" y="323" fill="#B5BED3" font-size="18" font-weight="600" font-family="Inter, Pretendard, sans-serif">관찰</text>
  <rect x="98" y="354" width="164" height="48" rx="18" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <text x="124" y="385" fill="#B5BED3" font-size="18" font-weight="600" font-family="Inter, Pretendard, sans-serif">연결</text>
  <rect x="98" y="416" width="164" height="48" rx="18" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <text x="124" y="447" fill="#B5BED3" font-size="18" font-weight="600" font-family="Inter, Pretendard, sans-serif">적용 질문</text>
  <rect x="98" y="530" width="164" height="170" rx="22" fill="black" fill-opacity="0.18"/>
  <text x="118" y="568" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">UX 목표</text>
  <text x="118" y="606" fill="white" font-size="24" font-weight="700" font-family="Inter, Pretendard, sans-serif">읽는 집중력</text>
  <text x="118" y="646" fill="#AAB4C8" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">왼쪽은 순서,
가운데는 본문,
오른쪽은 보충만 둡니다.</text>

  <rect x="320" y="154" width="804" height="976" rx="28" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
  <text x="364" y="214" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">본문 읽기</text>
  <text x="364" y="262" fill="white" font-size="40" font-weight="800" font-family="Inter, Pretendard, sans-serif">시편 13:1-6</text>
  <text x="364" y="302" fill="#BFC7D8" font-size="21" font-weight="500" font-family="Inter, Pretendard, sans-serif">본문은 방해 없이 길게 읽히고, 핵심 관찰은 카드 2~3개로만 붙습니다.</text>
  <rect x="364" y="338" width="716" height="404" rx="28" fill="#F8FAFC"/>
  <text x="412" y="392" fill="#1F2937" font-size="22" font-weight="700" font-family="Inter, Pretendard, sans-serif">1 주여 어느 때까지니이까 나를 영영히 잊으시나이까</text>
  <text x="412" y="444" fill="#374151" font-size="22" font-weight="500" font-family="Inter, Pretendard, sans-serif">2 나의 영혼은 번민하고 종일토록 마음에 근심하기를 어느 때까지 하오며</text>
  <text x="412" y="496" fill="#374151" font-size="22" font-weight="500" font-family="Inter, Pretendard, sans-serif">3 여호와 나의 하나님이여 나를 생각하사 응답하시고 내 눈을 밝히소서</text>
  <text x="412" y="548" fill="#374151" font-size="22" font-weight="500" font-family="Inter, Pretendard, sans-serif">4 두렵건대 나의 원수가 이르기를 내가 그를 이겼다 할까 하나이다</text>
  <text x="412" y="600" fill="#374151" font-size="22" font-weight="500" font-family="Inter, Pretendard, sans-serif">5 나는 오직 주의 인자하심을 의뢰하였사오니</text>
  <text x="412" y="652" fill="#374151" font-size="22" font-weight="500" font-family="Inter, Pretendard, sans-serif">6 내가 여호와를 찬송하리니 이는 주께서 내게 은덕을 베푸심이로다</text>

  <rect x="364" y="772" width="344" height="144" rx="24" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <text x="394" y="812" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">관찰 1</text>
  <text x="394" y="850" fill="white" font-size="24" font-weight="700" font-family="Inter, Pretendard, sans-serif">탄식은 관계 안에서 나온다</text>
  <text x="394" y="888" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">시인은 하나님을 떠나지 않고
직접 하나님께 말합니다.</text>

  <rect x="736" y="772" width="344" height="144" rx="24" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <text x="766" y="812" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">관찰 2</text>
  <text x="766" y="850" fill="white" font-size="24" font-weight="700" font-family="Inter, Pretendard, sans-serif">신뢰는 마지막에 회복된다</text>
  <text x="766" y="888" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">감정이 먼저 풀리는 게 아니라
기억된 인자하심이 방향을 바꿉니다.</text>

  <rect x="364" y="944" width="716" height="140" rx="24" fill="#151D31" stroke="#E7C986" stroke-opacity="0.28"/>
  <text x="394" y="984" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">다음 행동</text>
  <text x="394" y="1024" fill="white" font-size="26" font-weight="700" font-family="Inter, Pretendard, sans-serif">연결 본문 보기 · 적용 질문 답하기 · 그래프 열기</text>
  <text x="394" y="1060" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">스터디는 많이 보여주는 화면이 아니라, 깊게 읽도록 붙잡는 화면이어야 합니다.</text>

  <rect x="1152" y="154" width="378" height="976" rx="28" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
  <text x="1190" y="210" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">보조 노트</text>
  <rect x="1190" y="234" width="302" height="152" rx="24" fill="white" fill-opacity="0.03"/>
  <text x="1218" y="274" fill="white" font-size="22" font-weight="700" font-family="Inter, Pretendard, sans-serif">책 프로필</text>
  <text x="1218" y="314" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">시편 · 시가 · 예배 모음집
전통적 저자 이해
시대 범위 / 장소 / 청중</text>
  <rect x="1190" y="408" width="302" height="220" rx="24" fill="white" fill-opacity="0.03"/>
  <text x="1218" y="448" fill="white" font-size="22" font-weight="700" font-family="Inter, Pretendard, sans-serif">연결 질문</text>
  <text x="1218" y="488" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">지금의 기다림은 어디에서
믿음 없음이 아니라 탄식처럼 들리나요?

이 본문은 당신을 포기보다
기도 쪽으로 어떻게 밀어 줍니까?</text>
  <rect x="1190" y="650" width="302" height="178" rx="24" fill="black" fill-opacity="0.18"/>
  <text x="1218" y="690" fill="white" font-size="22" font-weight="700" font-family="Inter, Pretendard, sans-serif">연결 이동</text>
  <text x="1218" y="730" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">하박국 2장 보기
로마서 8장 보기
그래프에서 연결 구조 보기</text>
  <text x="800" y="1150" text-anchor="middle" fill="#70809E" font-size="16" font-weight="500" font-family="Inter, Pretendard, sans-serif">개념: study는 카드 나열이 아니라, 본문 읽기에 집중력을 주는 독서형 레이아웃이어야 함</text>
</svg>