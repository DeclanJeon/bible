<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="70" x2="1490" y2="1130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101626"/>
      <stop offset="1" stop-color="#070B15"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect x="40" y="32" width="1520" height="1136" rx="36" stroke="white" stroke-opacity="0.08"/>
  <rect x="66" y="60" width="1468" height="72" rx="24" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
  <text x="116" y="105" fill="white" font-size="24" font-weight="700" font-family="Inter, Pretendard, sans-serif">성경 하이퍼링크 컴패니언</text>
  <rect x="520" y="72" width="560" height="48" rx="24" fill="#F8FAFC"/>
  <circle cx="560" cy="96" r="12" stroke="#7C869F" stroke-width="2.5"/>
  <path d="M568 104L578 114" stroke="#7C869F" stroke-width="2.5" stroke-linecap="round"/>
  <text x="592" y="103" fill="#566075" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">기다림에 지쳤어요. 계속 기도하지만 너무 조용하게 느껴져요.</text>
  <rect x="1120" y="72" width="92" height="48" rx="24" fill="#E7C986"/>
  <text x="1166" y="102" text-anchor="middle" fill="#111827" font-size="18" font-weight="800" font-family="Inter, Pretendard, sans-serif">시작</text>

  <rect x="74" y="164" width="250" height="962" rx="30" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
  <text x="104" y="216" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">빠른 이동</text>
  <rect x="104" y="238" width="190" height="52" rx="18" fill="#E7C986" fill-opacity="0.16" stroke="#E7C986" stroke-opacity="0.38"/>
  <text x="136" y="271" fill="white" font-size="18" font-weight="700" font-family="Inter, Pretendard, sans-serif">요약 응답</text>
  <rect x="104" y="304" width="190" height="52" rx="18" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <text x="136" y="337" fill="#B5BED3" font-size="18" font-weight="600" font-family="Inter, Pretendard, sans-serif">대표 본문</text>
  <rect x="104" y="370" width="190" height="52" rx="18" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <text x="136" y="403" fill="#B5BED3" font-size="18" font-weight="600" font-family="Inter, Pretendard, sans-serif">연결 본문</text>
  <rect x="104" y="436" width="190" height="52" rx="18" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <text x="136" y="469" fill="#B5BED3" font-size="18" font-weight="600" font-family="Inter, Pretendard, sans-serif">맥락 노트</text>
  <rect x="104" y="540" width="190" height="150" rx="24" fill="black" fill-opacity="0.18" stroke="white" stroke-opacity="0.06"/>
  <text x="126" y="578" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">UX 원칙</text>
  <text x="126" y="614" fill="white" font-size="24" font-weight="700" font-family="Inter, Pretendard, sans-serif">한 화면,
한 흐름</text>
  <text x="126" y="662" fill="#AAB4C8" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">응답 → 본문 → 연결 →
다음 행동 순서만 남깁니다.</text>

  <rect x="356" y="164" width="824" height="962" rx="30" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
  <text x="402" y="220" fill="#E7C986" font-size="15" font-weight="700" font-family="Inter, Pretendard, sans-serif">COMPANION</text>
  <text x="402" y="270" fill="white" font-size="40" font-weight="800" font-family="Inter, Pretendard, sans-serif">침묵 속의 기다림</text>
  <text x="402" y="312" fill="#C1C9DA" font-size="22" font-weight="500" font-family="Inter, Pretendard, sans-serif">입력한 고민에 대해 가장 먼저 보여줘야 하는 건 해설의 양이 아니라 방향입니다.</text>

  <rect x="402" y="350" width="732" height="174" rx="28" fill="#151D31" stroke="#E7C986" stroke-opacity="0.28"/>
  <text x="432" y="392" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">한 문장 응답</text>
  <text x="432" y="438" fill="white" font-size="32" font-weight="700" font-family="Inter, Pretendard, sans-serif">지금의 기다림은 버려진 침묵이 아니라,
탄식 안에서도 계속 하나님께 말하게 하는 시간일 수 있습니다.</text>
  <text x="432" y="494" fill="#AAB4C8" font-size="19" font-weight="500" font-family="Inter, Pretendard, sans-serif">아래에서 바로 대표 본문, 연결 본문, 맥락 노트를 이어서 확인합니다.</text>

  <rect x="402" y="552" width="352" height="212" rx="26" fill="white" fill-opacity="0.035" stroke="white" stroke-opacity="0.08"/>
  <text x="432" y="592" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">대표 본문</text>
  <text x="432" y="634" fill="white" font-size="28" font-weight="700" font-family="Inter, Pretendard, sans-serif">시편 13편</text>
  <text x="432" y="674" fill="#C1C9DA" font-size="19" font-weight="500" font-family="Inter, Pretendard, sans-serif">하나님을 떠나지 않은 채
고통을 하나님 앞으로 가져오는 탄식</text>
  <rect x="432" y="708" width="122" height="42" rx="21" fill="#E7C986"/>
  <text x="493" y="735" text-anchor="middle" fill="#111827" font-size="16" font-weight="800" font-family="Inter, Pretendard, sans-serif">본문 읽기</text>

  <rect x="782" y="552" width="352" height="212" rx="26" fill="white" fill-opacity="0.035" stroke="white" stroke-opacity="0.08"/>
  <text x="812" y="592" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">왜 이 본문인가</text>
  <text x="812" y="634" fill="white" font-size="24" font-weight="700" font-family="Inter, Pretendard, sans-serif">기다림 · 침묵 · 신뢰</text>
  <text x="812" y="674" fill="#C1C9DA" font-size="19" font-weight="500" font-family="Inter, Pretendard, sans-serif">유저 입력과 본문 사이의 매칭 이유를
불필요한 메타 정보 없이 먼저 설명합니다.</text>

  <rect x="402" y="794" width="732" height="274" rx="26" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <text x="432" y="836" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">연결 본문</text>
  <rect x="432" y="860" width="214" height="166" rx="22" fill="#151D31"/>
  <text x="454" y="900" fill="white" font-size="22" font-weight="700" font-family="Inter, Pretendard, sans-serif">하박국 2:1-4</text>
  <text x="454" y="938" fill="#AAB4C8" font-size="17" font-weight="500" font-family="Inter, Pretendard, sans-serif">약속과 성취 사이의
간격을 견디는 본문</text>
  <rect x="670" y="860" width="214" height="166" rx="22" fill="#151D31"/>
  <text x="692" y="900" fill="white" font-size="22" font-weight="700" font-family="Inter, Pretendard, sans-serif">로마서 8:22-28</text>
  <text x="692" y="938" fill="#AAB4C8" font-size="17" font-weight="500" font-family="Inter, Pretendard, sans-serif">신음과 소망을
구속의 미래 안에서 읽기</text>
  <rect x="908" y="860" width="196" height="166" rx="22" fill="#151D31"/>
  <text x="930" y="900" fill="white" font-size="22" font-weight="700" font-family="Inter, Pretendard, sans-serif">다음 단계</text>
  <text x="930" y="938" fill="#AAB4C8" font-size="17" font-weight="500" font-family="Inter, Pretendard, sans-serif">스터디에서 본문 전체 읽기
그래프에서 연결 구조 보기</text>
  <rect x="930" y="972" width="132" height="40" rx="20" fill="#E7C986"/>
  <text x="996" y="997" text-anchor="middle" fill="#111827" font-size="16" font-weight="800" font-family="Inter, Pretendard, sans-serif">깊게 보기</text>

  <rect x="1210" y="164" width="324" height="962" rx="30" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
  <text x="1244" y="218" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">우측 보조 패널</text>
  <rect x="1244" y="244" width="256" height="118" rx="24" fill="black" fill-opacity="0.18"/>
  <text x="1268" y="286" fill="white" font-size="24" font-weight="700" font-family="Inter, Pretendard, sans-serif">현재 주제</text>
  <text x="1268" y="326" fill="#B2BCD0" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">기다림 · 탄식 · 신뢰</text>
  <rect x="1244" y="388" width="256" height="176" rx="24" fill="white" fill-opacity="0.03"/>
  <text x="1268" y="428" fill="white" font-size="22" font-weight="700" font-family="Inter, Pretendard, sans-serif">읽는 순서</text>
  <text x="1268" y="468" fill="#B2BCD0" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">1. 한 문장 응답
2. 대표 본문
3. 연결 본문
4. 스터디/그래프 이동</text>
  <rect x="1244" y="590" width="256" height="210" rx="24" fill="white" fill-opacity="0.03"/>
  <text x="1268" y="630" fill="white" font-size="22" font-weight="700" font-family="Inter, Pretendard, sans-serif">추천 주제 전환</text>
  <text x="1268" y="670" fill="#B2BCD0" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">실패 이후의 회복
두려움과 부르심
혼란 속의 지혜</text>
  <text x="800" y="1150" text-anchor="middle" fill="#70809E" font-size="16" font-weight="500" font-family="Inter, Pretendard, sans-serif">개념: companion은 정보 전시장 말고, 해설 흐름을 이끄는 결과 화면이어야 함</text>
</svg>