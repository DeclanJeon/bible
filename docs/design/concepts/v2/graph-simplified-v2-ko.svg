<rect x="166" y="806" width="214" height="118" rx="22" fill="#151D31"/><text x="190" y="848" fill="white" font-size="22" font-weight="700" font-family="Inter, Pretendard, sans-serif">로마서 8:22-28</text><text x="190" y="886" fill="#B5BED3" font-size="17" font-weight="500" font-family="Inter, Pretendard, sans-serif">신음과 소망</text>
