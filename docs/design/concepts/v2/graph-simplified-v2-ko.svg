<rect x="110" y="968" width="854" height="128" rx="24" fill="black" fill-opacity="0.18"/>
<text x="142" y="1010" fill="white" font-size="28" font-weight="700" font-family="Inter, Pretendard, sans-serif">지도는 장식이 아니라 읽기 순서를 설명해야 합니다.</text>
<text x="142" y="1052" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">중심 본문 하나, 확장 노드 셋, 그리고 왜 연결되는지 짧은 레이블이면 충분합니다.</text>

<rect x="1030" y="382" width="498" height="756" rx="30" fill="white" fill-opacity="0.035" stroke="white" stroke-opacity="0.08"/>
<text x="1066" y="428" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">오른쪽 설명</text>
<rect x="1066" y="456" width="426" height="210" rx="24" fill="white" fill-opacity="0.03"/>
<text x="1096" y="496" fill="white" font-size="28" font-weight="700" font-family="Inter, Pretendard, sans-serif">읽는 경로</text>
<text x="1096" y="540" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">1. 중심 서사/시 본문에서 시작
2. 연결 본문 2~3개로 확장
3. 스터디 데스크로 내려가 본문 전체 읽기</text>
<rect x="1066" y="690" width="426" height="164" rx="24" fill="white" fill-opacity="0.03"/>
<text x="1096" y="730" fill="white" font-size="28" font-weight="700" font-family="Inter, Pretendard, sans-serif">다음 단계</text>
<text x="1096" y="774" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">그래프를 본 뒤 바로 스터디로 이동.
개인 적용은 그 다음입니다.</text>
<rect x="1066" y="878" width="426" height="220" rx="24" fill="black" fill-opacity="0.18"/>
<text x="1096" y="918" fill="white" font-size="28" font-weight="700" font-family="Inter, Pretendard, sans-serif">해석 경계선</text>
<text x="1096" y="962" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">역사 노트에는 출처와 신뢰도 표시.
유대 전승과 기독교 해석은 구분.
개인 적용은 그래프의 출발점이 아니라 도착점.</text>
