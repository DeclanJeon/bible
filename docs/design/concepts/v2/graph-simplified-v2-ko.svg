<text x="110" y="312" fill="#C4CBD9" font-size="22" font-weight="500" font-family="Inter, Pretendard, sans-serif">화려한 네트워크보다 먼저 보여야 하는 건, 왜 여기서 저기로 읽어야 하는가입니다.</text>

