<rect x="888" y="340" width="136" height="52" rx="26" fill="#E7C986"/><text x="956" y="373" text-anchor="middle" fill="#111827" font-size="18" font-weight="800" font-family="Inter, Pretendard, sans-serif">레인 필터링</text>
