<rect x="1030" y="528" width="430" height="244" rx="24" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
<text x="1062" y="574" fill="white" font-size="30" font-weight="800" font-family="Inter, Pretendard, sans-serif">혼란 속의 지혜</text>
<text x="1062" y="614" fill="#E7C986" font-size="16" font-weight="700" font-family="Inter, Pretendard, sans-serif">인도</text>
<text x="1062" y="658" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">다음 결정을 위해
분별과 방향이 필요할 때</text>

<rect x="110" y="806" width="1350" height="272" rx="24" fill="black" fill-opacity="0.18"/>
<text x="144" y="850" fill="white" font-size="30" font-weight="700" font-family="Inter, Pretendard, sans-serif">카탈로그의 목적은 설명이 아니라 선택입니다.</text>
<text x="144" y="894" fill="#B5BED3" font-size="20" font-weight="500" font-family="Inter, Pretendard, sans-serif">상단 검색 1개 + 주제 칩 + 카드 목록만 있으면 유저는 충분히 빠르게 고를 수 있습니다.</text>
<text x="144" y="952" fill="#E7C986" font-size="16" font-weight="700" font-family="Inter, Pretendard, sans-serif">01 지금 닿는 정서 고르기</text>
<text x="144" y="992" fill="#E7C986" font-size="16" font-weight="700" font-family="Inter, Pretendard, sans-serif">02 카드 한 장 열기</text>
<text x="144" y="1032" fill="#E7C986" font-size="16" font-weight="700" font-family="Inter, Pretendard, sans-serif">03 묵상 / 스터디 / 그래프 중 하나로 바로 이동</text>
</svg>