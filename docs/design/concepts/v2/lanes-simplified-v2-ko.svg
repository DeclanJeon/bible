<rect x="434" y="402" width="84" height="36" rx="18" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/><text x="476" y="425" text-anchor="middle" fill="white" font-size="15" font-weight="700" font-family="Inter, Pretendard, sans-serif">부르심</text>

<rect x="72" y="454" width="1456" height="684" rx="30" fill="white" fill-opacity="0.035" stroke="white" stroke-opacity="0.08"/>
