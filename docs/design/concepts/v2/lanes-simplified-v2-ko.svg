<text x="110" y="268" fill="white" font-size="42" font-weight="800" font-family="Inter, Pretendard, sans-serif">가이드된 성경 패턴 전체 둘러보기</text>
<text x="110" y="312" fill="#C4CBD9" font-size="22" font-weight="500" font-family="Inter, Pretendard, sans-serif">여긴 기능 설명 페이지가 아니라, 지금 맞는 레인을 빨리 고르는 카탈로그여야 합니다.</text>
