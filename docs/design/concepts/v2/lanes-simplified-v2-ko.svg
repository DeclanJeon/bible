<text x="142" y="614" fill="#E7C986" font-size="16" font-weight="700" font-family="Inter, Pretendard, sans-serif">기다림</text>
<text x="142" y="658" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">오랜 기다림 속에서 지치고,
응답 없는 침묵처럼 느껴질 때</text>
<rect x="142" y="706" width="108" height="36" rx="18" fill="#E7C986"/><text x="196" y="729" text-anchor="middle" fill="#111827" font-size="15" font-weight="800" font-family="Inter, Pretendard, sans-serif">묵상 시작</text>
<rect x="262" y="706" width="110" height="36" rx="18" fill="white" fill-opacity="0.08"/><text x="317" y="729" text-anchor="middle" fill="white" font-size="15" font-weight="700" font-family="Inter, Pretendard, sans-serif">스터디</text>
<rect x="384" y="706" width="98" height="36" rx="18" fill="white" fill-opacity="0.08"/><text x="433" y="729" text-anchor="middle" fill="white" font-size="15" font-weight="700" font-family="Inter, Pretendard, sans-serif">그래프</text>

<rect x="570" y="528" width="430" height="244" rx="24" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
<text x="602" y="574" fill="white" font-size="30" font-weight="800" font-family="Inter, Pretendard, sans-serif">실패 이후의 회복</text>
<text x="602" y="614" fill="#E7C986" font-size="16" font-weight="700" font-family="Inter, Pretendard, sans-serif">회복</text>
<text x="602" y="658" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">수치심과 죄책감으로
