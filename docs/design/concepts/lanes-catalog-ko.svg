      <stop stop-color="#11182B"/>
      <stop offset="1" stop-color="#070B15"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect x="40" y="32" width="1520" height="1136" rx="36" stroke="white" stroke-opacity="0.08"/>
  <text x="110" y="108" fill="white" font-size="26" font-weight="700" font-family="Inter, Pretendard, sans-serif">레인 카탈로그</text>
  <text x="298" y="108" fill="#92A0BA" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">탐색은 쉬워야 하고, 선택은 빠르게 끝나야 합니다.</text>

  <rect x="70" y="156" width="1460" height="170" rx="30" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
  <text x="110" y="214" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">CATALOG SEARCH</text>
  <text x="110" y="260" fill="white" font-size="38" font-weight="800" font-family="Inter, Pretendard, sans-serif">가이드된 성경 패턴 둘러보기</text>
  <rect x="110" y="278" width="960" height="24" rx="12" fill="white" fill-opacity="0.01"/>
  <rect x="110" y="262" width="760" height="50" rx="25" fill="#F8FAFC"/>
