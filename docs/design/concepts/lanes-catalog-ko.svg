  <text x="104" y="468" fill="white" font-size="28" font-weight="700" font-family="Inter, Pretendard, sans-serif">1. 주제를 고른다</text>
  <text x="104" y="518" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">기다림 / 회복 / 두려움처럼
