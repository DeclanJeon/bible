  <rect x="250" y="348" width="102" height="40" rx="20" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <text x="301" y="373" text-anchor="middle" fill="#D6DDEB" font-size="16" font-weight="600" font-family="Inter, Pretendard, sans-serif">기다림</text>
  <rect x="366" y="348" width="102" height="40" rx="20" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <text x="417" y="373" text-anchor="middle" fill="#D6DDEB" font-size="16" font-weight="600" font-family="Inter, Pretendard, sans-serif">회복</text>
  <rect x="482" y="348" width="102" height="40" rx="20" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <text x="533" y="373" text-anchor="middle" fill="#D6DDEB" font-size="16" font-weight="600" font-family="Inter, Pretendard, sans-serif">부르심</text>
