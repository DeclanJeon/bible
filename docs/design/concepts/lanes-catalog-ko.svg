  <text x="104" y="594" fill="white" font-size="28" font-weight="700" font-family="Inter, Pretendard, sans-serif">2. 카드 하나를 연다</text>
  <text x="104" y="644" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">복잡한 리스트가 아니라
설명 있는 카드로 빠르게 선택합니다.</text>
  <rect x="104" y="744" width="212" height="180" rx="24" fill="black" fill-opacity="0.18"/>
  <text x="128" y="784" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">UX 목표</text>
  <text x="128" y="824" fill="white" font-size="24" font-weight="700" font-family="Inter, Pretendard, sans-serif">카탈로그는
