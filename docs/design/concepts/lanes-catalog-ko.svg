  <text x="182" y="294" fill="#566075" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">회복, 기다림, 두려움 같은 주제로 검색</text>
  <rect x="892" y="262" width="178" height="50" rx="25" fill="#E7C986"/>
  <text x="981" y="294" text-anchor="middle" fill="#111827" font-size="18" font-weight="800" font-family="Inter, Pretendard, sans-serif">검색 / 필터</text>

  <rect x="110" y="348" width="126" height="40" rx="20" fill="#E7C986" fill-opacity="0.16" stroke="#E7C986" stroke-opacity="0.38"/>
