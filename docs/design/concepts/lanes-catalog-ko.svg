  <text x="649" y="373" text-anchor="middle" fill="#D6DDEB" font-size="16" font-weight="600" font-family="Inter, Pretendard, sans-serif">애도</text>

  <rect x="70" y="366" width="280" height="754" rx="28" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
