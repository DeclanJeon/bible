  <text x="128" y="884" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">검색 / 필터 / 카드
세 요소만 남깁니다.</text>

  <rect x="380" y="414" width="1150" height="706" rx="28" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.06"/>
  <text x="424" y="466" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">RESULTS</text>

  <rect x="424" y="498" width="326" height="232" rx="24" fill="#151D31" stroke="#E7C986" stroke-opacity="0.28"/>
