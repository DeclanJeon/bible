  <text x="452" y="584" fill="#E7C986" font-size="16" font-weight="700" font-family="Inter, Pretendard, sans-serif">기다림</text>
  <text x="452" y="626" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">오랜 기다림 속에서 지치고,
응답 없는 침묵처럼 느껴질 때</text>
  <rect x="452" y="670" width="120" height="40" rx="20" fill="#E7C986"/>
  <text x="512" y="695" text-anchor="middle" fill="#111827" font-size="16" font-weight="800" font-family="Inter, Pretendard, sans-serif">시작하기</text>

  <rect x="792" y="498" width="326" height="232" rx="24" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <text x="820" y="540" fill="white" font-size="28" font-weight="700" font-family="Inter, Pretendard, sans-serif">실패 이후의 회복</text>
  <text x="820" y="584" fill="#E7C986" font-size="16" font-weight="700" font-family="Inter, Pretendard, sans-serif">회복</text>
  <text x="820" y="626" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">수치심과 죄책감으로
다시 돌아가기 어려울 때</text>
  <rect x="820" y="670" width="120" height="40" rx="20" fill="white" fill-opacity="0.08"/>
  <text x="880" y="695" text-anchor="middle" fill="white" font-size="16" font-weight="700" font-family="Inter, Pretendard, sans-serif">열기</text>

  <rect x="1160" y="498" width="326" height="232" rx="24" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08"/>
  <text x="1188" y="540" fill="white" font-size="28" font-weight="700" font-family="Inter, Pretendard, sans-serif">혼란 속의 지혜</text>
  <text x="1188" y="584" fill="#E7C986" font-size="16" font-weight="700" font-family="Inter, Pretendard, sans-serif">인도</text>
  <text x="1188" y="626" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">다음 결정을 위해
분별과 방향이 필요할 때</text>
  <rect x="1188" y="670" width="120" height="40" rx="20" fill="white" fill-opacity="0.08"/>
  <text x="1248" y="695" text-anchor="middle" fill="white" font-size="16" font-weight="700" font-family="Inter, Pretendard, sans-serif">열기</text>

  <rect x="424" y="770" width="1062" height="296" rx="24" fill="black" fill-opacity="0.16"/>
  <text x="460" y="816" fill="#E7C986" font-size="14" font-weight="700" font-family="Inter, Pretendard, sans-serif">선택 후 이동</text>
  <text x="460" y="860" fill="white" font-size="30" font-weight="700" font-family="Inter, Pretendard, sans-serif">카드 안에서 바로 3갈래 액션</text>
  <text x="460" y="904" fill="#B5BED3" font-size="20" font-weight="500" font-family="Inter, Pretendard, sans-serif">묵상 시작 · 스터디 열기 · 그래프 보기</text>
  <text x="460" y="956" fill="#B5BED3" font-size="18" font-weight="500" font-family="Inter, Pretendard, sans-serif">유저는 “이건 뭐지?”보다 “이걸 누르면 어디로 가는지”를 바로 이해해야 합니다.</text>
  <text x="800" y="1150" text-anchor="middle" fill="#70809E" font-size="16" font-weight="500" font-family="Inter, Pretendard, sans-serif">개념: lanes는 기능 목록이 아니라 빠른 선택 카탈로그여야 함</text>
</svg>